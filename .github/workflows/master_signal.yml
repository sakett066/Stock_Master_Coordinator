name: Master Signal Coordinator

on:
  schedule:
    - cron: '30 1 * * 0-4'
    - cron: '0 4 * * 0-4'
    - cron: '0 6 * * 0-4'
    - cron: '15 7 * * 0-4'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests numpy yfinance
      - name: Run Master Scan
        env:
          TELEGRAM_MASTER_BOT_TOKEN: ${{ secrets.TELEGRAM_MASTER_BOT_TOKEN }}
          TELEGRAM_MASTER_CHAT_ID: ${{ secrets.TELEGRAM_MASTER_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python master_signal.py
